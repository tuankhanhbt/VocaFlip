spring:
  application:
    name: vocaflip
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:vocaflip}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

app:
  cors:
    allowed-origins: http://localhost:3000
  security:
    jwt-secret: ${JWT_SECRET:change-this-secret-key-to-a-long-random-value-1234567890}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
google:
  ai:
    api-key: AIzaSyBAqwi3qeECkQwPwG5f3VQ1iBZpgJ2B8Ik
    model: gemini-2.5-flash

dictionary:
  api:
    base-url: https://api.dictionaryapi.dev/api/v2/entries/en